syntax = "proto3";

package galactica.common.v1;

import "google/protobuf/timestamp.proto";

// === Identifiers ===

message NodeId {
  string value = 1;
}

message ModelId {
  string value = 1;
}

message TaskId {
  string value = 1;
}

message InstanceId {
  string value = 1;
}

message TenantId {
  string value = 1;
}

// === Enums ===

enum AcceleratorType {
  ACCELERATOR_TYPE_UNSPECIFIED = 0;
  ACCELERATOR_TYPE_CPU = 1;
  ACCELERATOR_TYPE_METAL = 2;
  ACCELERATOR_TYPE_CUDA = 3;
  ACCELERATOR_TYPE_ROCM = 4;
  ACCELERATOR_TYPE_DIRECTML = 5;
}

enum OsType {
  OS_TYPE_UNSPECIFIED = 0;
  OS_TYPE_MACOS = 1;
  OS_TYPE_LINUX = 2;
  OS_TYPE_WINDOWS = 3;
}

enum CpuArch {
  CPU_ARCH_UNSPECIFIED = 0;
  CPU_ARCH_ARM64 = 1;
  CPU_ARCH_X86_64 = 2;
}

enum NetworkProfile {
  NETWORK_PROFILE_UNSPECIFIED = 0;
  NETWORK_PROFILE_LAN = 1;
  NETWORK_PROFILE_WAN = 2;
  NETWORK_PROFILE_PUBLIC = 3;
  NETWORK_PROFILE_NATED = 4;
}

enum NodeStatus {
  NODE_STATUS_UNSPECIFIED = 0;
  NODE_STATUS_REGISTERING = 1;
  NODE_STATUS_ONLINE = 2;
  NODE_STATUS_OFFLINE = 3;
  NODE_STATUS_DRAINING = 4;
  NODE_STATUS_REMOVED = 5;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING = 1;
  TASK_STATUS_RUNNING = 2;
  TASK_STATUS_COMPLETED = 3;
  TASK_STATUS_FAILED = 4;
  TASK_STATUS_CANCELLED = 5;
}

// === Composite Types ===

message Memory {
  uint64 total_bytes = 1;
  uint64 available_bytes = 2;
}

message AcceleratorInfo {
  AcceleratorType type = 1;
  string name = 2;
  Memory vram = 3;
  string compute_capability = 4;
}

message NodeCapabilities {
  OsType os = 1;
  CpuArch cpu_arch = 2;
  repeated AcceleratorInfo accelerators = 3;
  Memory system_memory = 4;
  NetworkProfile network_profile = 5;
  repeated string runtime_backends = 6;
  map<string, string> locality = 7;
}

message NodeInfo {
  NodeId node_id = 1;
  string hostname = 2;
  NodeCapabilities capabilities = 3;
  NodeStatus status = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
  string version = 6;
}

// === Model Types ===

message ModelVariant {
  string runtime = 1;
  string quantization = 2;
  string format = 3;
  uint64 size_bytes = 4;
  repeated AcceleratorType compatible_accelerators = 5;
  DistributedExecutionPolicy distributed = 6;
}

message ModelManifest {
  ModelId model_id = 1;
  string name = 2;
  string family = 3;
  repeated ModelVariant variants = 4;
  string chat_template = 5;
  map<string, string> metadata = 6;
}

message DistributedExecutionPolicy {
  string backend_family = 1;
  uint32 min_shards = 2;
  uint32 max_shards = 3;
  uint32 preferred_shards = 4;
  uint64 per_shard_overhead_bytes = 5;
  bool requires_homogeneous_backend = 6;
  bool supports_generation = 7;
  bool supports_embedding = 8;
}

message ShardAssignment {
  NodeId node_id = 1;
  uint32 shard_index = 2;
  uint32 shard_count = 3;
  bool is_coordinator = 4;
  string backend_family = 5;
  uint64 memory_budget_bytes = 6;
  string agent_endpoint = 7;
}

// === Event Types ===

message ClusterEvent {
  string event_id = 1;
  google.protobuf.Timestamp timestamp = 2;
  oneof event {
    NodeJoined node_joined = 3;
    NodeLeft node_left = 4;
    ModelLoaded model_loaded = 5;
    ModelUnloaded model_unloaded = 6;
    TaskCompleted task_completed = 7;
  }
}

message NodeJoined {
  NodeInfo node = 1;
}

message NodeLeft {
  NodeId node_id = 1;
  string reason = 2;
}

message ModelLoaded {
  NodeId node_id = 1;
  ModelId model_id = 2;
  InstanceId instance_id = 3;
}

message ModelUnloaded {
  NodeId node_id = 1;
  InstanceId instance_id = 2;
}

message TaskCompleted {
  TaskId task_id = 1;
  TaskStatus status = 2;
}
